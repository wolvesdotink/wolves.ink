<?xml version="1.0" encoding="UTF-8"?>
<!--
  Browser-tab favicon — square format with a rounded ink backdrop so the
  cream W stays legible whether the tab strip is light or dark. Mirrors
  the wordmark glyph in AppHeader.vue (cream-on-ink stamp) so the brand
  identity reads the same in the tab as it does on the page.

  ViewBox math: the source W path lives in 0–550 × 0–414 after the inner
  translate. Wrapping it in viewBox="-50 -118 650 650" gives us a 1:1
  square with 50u left/right padding and 118u top/bottom padding,
  visually centring the asymmetric mark.
-->
<svg viewBox="-50 -118 650 650" xmlns="http://www.w3.org/2000/svg">
    <rect x="-50" y="-118" width="650" height="650" rx="100" fill="#0d0c0a"/>
    <g transform="translate(-225 -304)" fill="#f1e9d8">
