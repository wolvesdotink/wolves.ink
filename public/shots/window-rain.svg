<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#f1e9d8"/>
  <!-- Window pane darker than the paper for "rainy day" -->
  <rect x="80" y="80" width="640" height="640" fill="#0d0c0a" opacity="0.85"/>
  <rect x="100" y="100" width="600" height="600" fill="#14130f"/>
  <!-- Cross frame -->
  <line x1="400" y1="100" x2="400" y2="700" stroke="#0d0c0a" stroke-width="8"/>
  <line x1="100" y1="400" x2="700" y2="400" stroke="#0d0c0a" stroke-width="8"/>
  <!-- Raindrops as elongated shapes -->
  <g fill="#f1e9d8" opacity="0.85">
    <ellipse cx="160" cy="180" rx="4" ry="14"/>
    <ellipse cx="220" cy="220" rx="3" ry="10"/>
    <ellipse cx="260" cy="160" rx="4" ry="16"/>
    <ellipse cx="320" cy="240" rx="3" ry="12"/>
    <ellipse cx="360" cy="200" rx="4" ry="14"/>
    <ellipse cx="500" cy="170" rx="4" ry="14"/>
    <ellipse cx="540" cy="240" rx="3" ry="10"/>
    <ellipse cx="600" cy="200" rx="4" ry="14"/>
    <ellipse cx="640" cy="160" rx="3" ry="12"/>
    <ellipse cx="180" cy="500" rx="4" ry="14"/>
    <ellipse cx="240" cy="540" rx="3" ry="10"/>
    <ellipse cx="300" cy="480" rx="4" ry="16"/>
    <ellipse cx="340" cy="540" rx="3" ry="12"/>
    <ellipse cx="460" cy="500" rx="4" ry="14"/>
    <ellipse cx="520" cy="540" rx="3" ry="10"/>
    <ellipse cx="580" cy="480" rx="4" ry="14"/>
    <ellipse cx="640" cy="540" rx="3" ry="12"/>
  </g>
  <!-- Trickles down the glass -->
  <g fill="none" stroke="#f1e9d8" stroke-width="2" opacity="0.5">
    <path d="M 160 200 q 4 80 -10 160 q -4 80 4 120"/>
    <path d="M 320 240 q 4 80 -10 160 q -4 80 4 120"/>
    <path d="M 500 180 q 4 80 -10 160 q -4 80 4 120"/>
    <path d="M 640 220 q 4 80 -10 160 q -4 80 4 120"/>
  </g>
</svg>
