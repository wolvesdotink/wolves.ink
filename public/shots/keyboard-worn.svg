<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#f1e9d8"/>
  <!-- Keyboard tray -->
  <rect x="60" y="220" width="680" height="380" fill="#0d0c0a"/>
  <!-- Row of keys — three rows. We slightly fade out the E key to look "worn." -->
  <g fill="#fbf6e9">
    <!-- Row 1 -->
    <rect x="80" y="260" width="50" height="50" rx="4"/>
    <rect x="140" y="260" width="50" height="50" rx="4"/>
    <rect x="200" y="260" width="50" height="50" rx="4"/>
    <rect x="260" y="260" width="50" height="50" rx="4"/>
    <rect x="320" y="260" width="50" height="50" rx="4"/>
    <rect x="380" y="260" width="50" height="50" rx="4"/>
    <rect x="440" y="260" width="50" height="50" rx="4"/>
    <rect x="500" y="260" width="50" height="50" rx="4"/>
    <rect x="560" y="260" width="50" height="50" rx="4"/>
    <rect x="620" y="260" width="50" height="50" rx="4"/>
    <rect x="680" y="260" width="50" height="50" rx="4"/>
    <!-- Row 2 — E key is "worn" -->
    <rect x="100" y="320" width="50" height="50" rx="4"/>
    <rect x="160" y="320" width="50" height="50" rx="4"/>
    <rect x="220" y="320" width="50" height="50" rx="4" opacity="0.55"/>
    <rect x="280" y="320" width="50" height="50" rx="4"/>
    <rect x="340" y="320" width="50" height="50" rx="4"/>
    <rect x="400" y="320" width="50" height="50" rx="4"/>
    <rect x="460" y="320" width="50" height="50" rx="4"/>
    <rect x="520" y="320" width="50" height="50" rx="4"/>
    <rect x="580" y="320" width="50" height="50" rx="4"/>
    <rect x="640" y="320" width="50" height="50" rx="4"/>
    <rect x="700" y="320" width="38" height="50" rx="4"/>
    <!-- Row 3 -->
    <rect x="80" y="380" width="60" height="50" rx="4"/>
    <rect x="150" y="380" width="50" height="50" rx="4"/>
    <rect x="210" y="380" width="50" height="50" rx="4"/>
    <rect x="270" y="380" width="50" height="50" rx="4"/>
    <rect x="330" y="380" width="50" height="50" rx="4"/>
    <rect x="390" y="380" width="50" height="50" rx="4"/>
    <rect x="450" y="380" width="50" height="50" rx="4"/>
    <rect x="510" y="380" width="50" height="50" rx="4"/>
    <rect x="570" y="380" width="50" height="50" rx="4"/>
    <rect x="630" y="380" width="50" height="50" rx="4"/>
    <rect x="690" y="380" width="48" height="50" rx="4"/>
    <!-- Spacebar -->
    <rect x="180" y="440" width="440" height="48" rx="4"/>
  </g>
  <!-- The worn E label faded -->
  <text x="245" y="354" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0d0c0a" opacity="0.55">E</text>
  <!-- A few key labels for character -->
  <g font-family="sans-serif" font-size="20" font-weight="700" fill="#0d0c0a">
    <text x="105" y="293" text-anchor="middle">Q</text>
    <text x="165" y="293" text-anchor="middle">W</text>
    <text x="225" y="293" text-anchor="middle">E</text>
    <text x="285" y="293" text-anchor="middle">R</text>
    <text x="125" y="354" text-anchor="middle">A</text>
    <text x="185" y="354" text-anchor="middle">S</text>
  </g>
  <!-- Cord exit -->
  <path d="M 400 220 q 0 -40 40 -60" fill="none" stroke="#0d0c0a" stroke-width="5"/>
</svg>
