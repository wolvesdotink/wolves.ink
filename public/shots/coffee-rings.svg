<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#f1e9d8"/>
  <!-- Three overlapping coffee rings — left by mugs over the course of an evening -->
  <g fill="none" stroke="#0d0c0a">
    <circle cx="280" cy="300" r="140" stroke-width="6" opacity="0.55"/>
    <circle cx="280" cy="300" r="148" stroke-width="3" opacity="0.35"/>
    <circle cx="500" cy="380" r="160" stroke-width="6" opacity="0.65"/>
    <circle cx="500" cy="380" r="170" stroke-width="3" opacity="0.4"/>
    <circle cx="380" cy="540" r="130" stroke-width="6" opacity="0.5"/>
    <circle cx="380" cy="540" r="138" stroke-width="3" opacity="0.3"/>
  </g>
  <!-- A few partial rings to suggest other sips -->
  <path d="M 620 200 a 80 80 0 0 1 60 30" fill="none" stroke="#0d0c0a" stroke-width="5" opacity="0.45"/>
  <path d="M 140 540 a 90 90 0 0 1 -60 -50" fill="none" stroke="#0d0c0a" stroke-width="5" opacity="0.45"/>
  <!-- A bean for fun -->
  <ellipse cx="660" cy="640" rx="22" ry="14" fill="#0d0c0a" transform="rotate(-20 660 640)"/>
  <path d="M 644 638 q 16 -4 32 0" fill="none" stroke="#f1e9d8" stroke-width="2"/>
  <!-- Note scribble -->
  <text x="80" y="120" font-family="serif" font-style="italic" font-size="36" fill="#0d0c0a">three coffees,</text>
  <text x="80" y="160" font-family="serif" font-style="italic" font-size="36" fill="#0d0c0a">one decision.</text>
</svg>
