<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#f1e9d8"/>
  <!-- Torn paper scrap with rotation -->
  <g transform="translate(400 400) rotate(-6) translate(-400 -400)">
    <path d="M 140 200 L 660 180 L 680 280 L 670 380 L 690 480 L 660 560 L 580 600 L 500 590 L 420 610 L 340 600 L 260 620 L 200 580 L 160 480 L 140 380 L 130 280 Z"
          fill="#fbf6e9" stroke="#0d0c0a" stroke-width="3"/>
    <!-- Image fragment inside the scrap -->
    <rect x="220" y="260" width="380" height="260" fill="#0d0c0a" opacity="0.85"/>
    <!-- Halftone dots simulating a printed photo -->
    <g fill="#f1e9d8">
      <circle cx="260" cy="300" r="5"/>
      <circle cx="290" cy="300" r="3"/>
      <circle cx="320" cy="300" r="5"/>
      <circle cx="350" cy="300" r="3"/>
      <circle cx="380" cy="300" r="5"/>
      <circle cx="410" cy="300" r="3"/>
      <circle cx="440" cy="300" r="5"/>
      <circle cx="470" cy="300" r="3"/>
      <circle cx="500" cy="300" r="5"/>
      <circle cx="530" cy="300" r="3"/>
      <circle cx="560" cy="300" r="5"/>
      <circle cx="260" cy="340" r="3"/>
      <circle cx="290" cy="340" r="5"/>
      <circle cx="320" cy="340" r="3"/>
      <circle cx="350" cy="340" r="5"/>
      <circle cx="380" cy="340" r="3"/>
      <circle cx="410" cy="340" r="5"/>
      <circle cx="440" cy="340" r="3"/>
      <circle cx="470" cy="340" r="5"/>
      <circle cx="500" cy="340" r="3"/>
      <circle cx="530" cy="340" r="5"/>
      <circle cx="560" cy="340" r="3"/>
    </g>
    <!-- Caption underneath -->
    <text x="400" y="560" text-anchor="middle" font-family="monospace" font-size="22" letter-spacing="3" fill="#0d0c0a">REFERENCE · 2009</text>
    <!-- Tape -->
    <rect x="320" y="170" width="120" height="30" fill="#0d0c0a" opacity="0.4"/>
  </g>
</svg>
