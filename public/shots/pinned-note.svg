<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#f1e9d8"/>
  <!-- Corkboard texture -->
  <g fill="#0d0c0a" opacity="0.08">
    <circle cx="100" cy="100" r="3"/><circle cx="160" cy="140" r="3"/>
    <circle cx="220" cy="80" r="3"/><circle cx="280" cy="160" r="3"/>
    <circle cx="700" cy="120" r="3"/><circle cx="640" cy="180" r="3"/>
    <circle cx="120" cy="700" r="3"/><circle cx="220" cy="640" r="3"/>
    <circle cx="700" cy="700" r="3"/><circle cx="620" cy="640" r="3"/>
    <circle cx="380" cy="80" r="3"/><circle cx="440" cy="120" r="3"/>
  </g>
  <!-- Note -->
  <g transform="translate(400 400) rotate(-3) translate(-400 -400)">
    <rect x="160" y="180" width="480" height="440" fill="#fbf6e9" stroke="#0d0c0a" stroke-width="3"/>
    <text x="400" y="280" text-anchor="middle" font-family="monospace" font-size="22" letter-spacing="6" fill="#0d0c0a">HOUSE RULES</text>
    <line x1="200" y1="310" x2="600" y2="310" stroke="#0d0c0a" stroke-width="2"/>
    <text x="200" y="380" font-family="serif" font-style="italic" font-size="34" fill="#0d0c0a">Less talking.</text>
    <text x="200" y="440" font-family="serif" font-style="italic" font-size="34" fill="#0d0c0a">More shipping.</text>
    <text x="200" y="510" font-family="serif" font-style="italic" font-size="28" fill="#0d0c0a">Open by default.</text>
    <text x="200" y="560" font-family="serif" font-style="italic" font-size="28" fill="#0d0c0a">Learn loudly.</text>
    <text x="600" y="600" text-anchor="end" font-family="serif" font-style="italic" font-size="22" fill="#0d0c0a">— W</text>
  </g>
  <!-- Pushpin in the top-right -->
  <circle cx="560" cy="190" r="18" fill="#0d0c0a"/>
  <circle cx="555" cy="184" r="6" fill="#fbf6e9" opacity="0.6"/>
</svg>
