<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#f1e9d8"/>
  <!-- Two open pages with a center binding -->
  <rect x="80" y="180" width="320" height="440" fill="#fbf6e9" stroke="#0d0c0a" stroke-width="3"/>
  <rect x="400" y="180" width="320" height="440" fill="#fbf6e9" stroke="#0d0c0a" stroke-width="3"/>
  <line x1="400" y1="180" x2="400" y2="620" stroke="#0d0c0a" stroke-width="6"/>
  <!-- Left page sketch — idea bubble with arrows -->
  <circle cx="240" cy="320" r="60" fill="none" stroke="#0d0c0a" stroke-width="3"/>
  <text x="240" y="332" text-anchor="middle" font-family="serif" font-style="italic" font-size="36" fill="#0d0c0a">idea</text>
  <line x1="180" y1="420" x2="280" y2="500" stroke="#0d0c0a" stroke-width="3"/>
  <line x1="280" y1="500" x2="270" y2="490" stroke="#0d0c0a" stroke-width="3"/>
  <line x1="280" y1="500" x2="270" y2="510" stroke="#0d0c0a" stroke-width="3"/>
  <text x="200" y="540" font-family="sans-serif" font-size="20" fill="#0d0c0a">execute</text>
  <!-- Right page sketch — wireframe -->
  <rect x="440" y="220" width="240" height="160" fill="none" stroke="#0d0c0a" stroke-width="3"/>
  <line x1="440" y1="270" x2="680" y2="270" stroke="#0d0c0a" stroke-width="2"/>
  <rect x="460" y="290" width="80" height="70" fill="#0d0c0a" opacity="0.7"/>
  <line x1="560" y1="300" x2="660" y2="300" stroke="#0d0c0a" stroke-width="2"/>
  <line x1="560" y1="320" x2="660" y2="320" stroke="#0d0c0a" stroke-width="2"/>
  <line x1="560" y1="340" x2="640" y2="340" stroke="#0d0c0a" stroke-width="2"/>
  <!-- Annotations on right -->
  <line x1="440" y1="430" x2="680" y2="430" stroke="#0d0c0a" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="440" y1="470" x2="660" y2="470" stroke="#0d0c0a" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="440" y1="510" x2="600" y2="510" stroke="#0d0c0a" stroke-width="1.5" stroke-dasharray="6 6"/>
</svg>
